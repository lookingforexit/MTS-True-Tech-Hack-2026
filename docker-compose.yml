services:
  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    container_name: ocean-cucumber-backend
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - LLM_ADDR=llm:50051
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ocean-cucumber-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  llm:
    build:
      context: .
      dockerfile: services/llm/Dockerfile
    container_name: ocean-cucumber-llm
    ports:
      - "50051:50051"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LUA_VALIDATOR_HOST=lua-validator
      - LUA_VALIDATOR_PORT=50052
    depends_on:
      - ollama
      - lua-validator
    restart: unless-stopped

  lua-validator:
    build:
      context: .
      dockerfile: services/lua-validator/Dockerfile
    container_name: ocean-cucumber-lua-validator
    ports:
      - "50052:50052"
    restart: unless-stopped

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: ocean-cucumber-frontend
    environment:
      - BACKEND_URL=http://backend:8080
    ports:
      - "8501:8501"
    depends_on:
      - backend
      - llm
    restart: unless-stopped
    
  tests:
    build:
      context: .
      dockerfile: tests/Dockerfile
    environment:
      - LLM_TARGET=llm:50051
      - VALIDATOR_TARGET=lua-validator:50052
    volumes:
      - ./tests/reports:/app/tests/reports
    depends_on:
      - llm
      - lua-validator
      - ollama
    profiles: ["tests"]

volumes:
  ollama-data: