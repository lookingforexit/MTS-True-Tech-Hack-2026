# ──────────────────────────────────────────────────────────────
# Ocean Cucumber — main compose file (no GPU required)
#
# Usage:
#   docker compose up --build          # start all services
#   docker compose --profile tests up  # include test runner
#
# For GPU-accelerated Ollama, use the override:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
# ──────────────────────────────────────────────────────────────

services:
  # ── Lua Validator (pure Python + Lua, no GPU) ─────────────
  lua-validator:
    build:
      context: .
      dockerfile: services/lua-validator/Dockerfile
    container_name: ocean-cucumber-lua-validator
    ports:
      - "50052:50052"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 50052)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Ollama (CPU mode by default) ──────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ocean-cucumber-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── LLM Service (LangGraph + gRPC) ────────────────────────
  llm:
    build:
      context: .
      dockerfile: services/llm/Dockerfile
    container_name: ocean-cucumber-llm
    ports:
      - "50051:50051"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LUA_VALIDATOR_HOST=lua-validator
      - LUA_VALIDATOR_PORT=50052
    depends_on:
      ollama:
        condition: service_healthy
      lua-validator:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 50051)); s.close()"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ── Backend (Go / Gin) ────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    container_name: ocean-cucumber-backend
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - LLM_ADDR=llm:50051
    depends_on:
      llm:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend (Streamlit) ──────────────────────────────────
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: ocean-cucumber-frontend
    environment:
      - BACKEND_URL=http://backend:8080
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8501/_stcore/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Tests (profile: tests) ────────────────────────────────
  tests:
    build:
      context: .
      dockerfile: tests/Dockerfile
    container_name: ocean-cucumber-tests
    environment:
      - LLM_TARGET=llm:50051
      - VALIDATOR_TARGET=lua-validator:50052
    volumes:
      - ./tests/reports:/app/tests/reports
    depends_on:
      llm:
        condition: service_healthy
      lua-validator:
        condition: service_healthy
    profiles: ["tests"]

volumes:
  ollama-data:
