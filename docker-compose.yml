# ──────────────────────────────────────────────────────────────
# Ocean Cucumber — main compose file (no GPU required)
#
# Usage:
#   docker compose up --build          # start all services
#   docker compose --profile tests up  # include test runner
#
# For GPU-accelerated Ollama, use the override:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
# ──────────────────────────────────────────────────────────────

services:
  # ── Lua Validator (pure Python + Lua, no GPU) ─────────────
  lua-validator:
    build:
      context: .
      dockerfile: services/lua-validator/Dockerfile
    container_name: ocean-cucumber-lua-validator
    ports:
      - "50052:50052"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 50052)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Ollama (CPU mode by default) ──────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ocean-cucumber-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── LLM Service (LangGraph + gRPC) ────────────────────────
  llm:
    build:
      context: .
      dockerfile: services/llm/Dockerfile
    container_name: ocean-cucumber-llm
    ports:
      - "50051:50051"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LUA_CHECKER_HOST=lua-checker
      - LUA_CHECKER_PORT=50053
      - LUA_VALIDATOR_HOST=lua-validator
      - LUA_VALIDATOR_PORT=50052
    depends_on:
      ollama:
        condition: service_healthy
      lua-checker:
        condition: service_started
      lua-validator:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 50051)); s.close()\" || { [ -f /proc/1/cmdline ] && tr '\\0' ' ' < /proc/1/cmdline | grep -q './startup.sh'; }"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ── Backend (Go / Gin) ────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    container_name: ocean-cucumber-backend
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - LLM_ADDR=llm:50051
      - REDIS_ADDR=redis:6379
    depends_on:
      llm:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: ocean-cucumber-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  lua-checker:
    build:
      context: .
      dockerfile: services/lua-checker/Dockerfile
    container_name: ocean-cucumber-lua-checker
    ports:
      - "50053:50053"
    restart: unless-stopped

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: ocean-cucumber-frontend
    environment:
      - BACKEND_URL=http://backend:8080
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Tests (profile: tests) ────────────────────────────────
  tests:
    build:
      context: .
      dockerfile: ./services/tests/Dockerfile
    container_name: ocean-cucumber-tests
    environment:
      - LLM_TARGET=llm:50051
      - VALIDATOR_TARGET=lua-validator:50052
    volumes:
      - ./services/tests/reports:/app/tests/reports
    depends_on:
      llm:
        condition: service_healthy
      lua-validator:
        condition: service_healthy
    profiles: ["tests"]

volumes:
  ollama-data:
