services:
  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    container_name: ocean-cucumber-backend
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
    restart: unless-stopped

  agent:
    build:
      context: ./services/agent
      dockerfile: Dockerfile
    container_name: ocean-cucumber-agent
    ports:
      - "8000:8000"
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: ocean-cucumber-frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
      - agent
    restart: unless-stopped
