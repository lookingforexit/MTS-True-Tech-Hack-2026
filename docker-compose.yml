services:
  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    container_name: ocean-cucumber-backend
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ocean-cucumber-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  llm:
    build:
      context: .
      dockerfile: services/llm/Dockerfile
    container_name: ocean-cucumber-llm
    ports:
      - "50051:50051"
    environment:
      - LLM_MODEL=qwen2.5-coder:1.5b-instruct-q4_K_M
      - OLLAMA_HOST=http://ollama:11434
      - LUA_VALIDATOR_HOST=lua-validator
      - LUA_VALIDATOR_PORT=50052
      - MAX_REPAIRS=2
    depends_on:
      - ollama
      - lua-validator
    restart: unless-stopped

  lua-validator:
    build:
      context: .
      dockerfile: services/lua-validator/Dockerfile
    container_name: ocean-cucumber-lua-validator
    ports:
      - "50052:50052"
    restart: unless-stopped

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: ocean-cucumber-frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
      - llm
    restart: unless-stopped

volumes:
  ollama-data:
