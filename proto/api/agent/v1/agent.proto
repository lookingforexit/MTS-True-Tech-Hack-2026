syntax = "proto3";

package agent.v1;

option go_package = "backend/gen/agent/v1;agentv1";

enum Stage {
  STAGE_UNSPECIFIED = 0;
  STAGE_ANALYZING = 1;
  STAGE_RETRIEVING = 2;
  STAGE_GENERATING = 3;
  STAGE_VALIDATING = 4;
  STAGE_CLARIFICATION_NEEDED = 5;
  STAGE_DONE = 6;
  STAGE_ERROR = 7;
}

message GenerateRequest {
  string session_id = 1;
  string task = 2;
  string context_json = 3;
  string mode = 4;
}

message GenerateResponse {
  Stage stage = 1;
  string message = 2;
  string code = 3;
  string question = 4;
}

service AgentService {
  rpc Generate(stream GenerateRequest) returns (stream GenerateResponse);
}
